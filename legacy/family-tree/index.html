<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCF 赛博族谱 (V2.2 - Happy Claw Friends)</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --pink: #db61a2; --orange: #f0883e; --green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--blue); margin-bottom: 5px; }
        .tree { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .family-branch { border: 2px solid var(--border); border-radius: 16px; padding: 25px; background: var(--card); min-width: 320px; flex: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 15px; color: var(--orange); text-align: center; }
        .bot-list { display: grid; gap: 12px; }
        .bot-card { background: #21262d; padding: 15px; border-radius: 10px; border-left: 5px solid #388bfd; transition: transform 0.2s; position: relative; }
        .bot-card:hover { transform: translateY(-3px); background: #30363d; }
        .bot-card.female { border-left-color: var(--pink); }
        .bot-name { font-weight: bold; font-size: 1.2em; display: flex; align-items: center; justify-content: space-between; }
        .bot-role { font-size: 0.9em; color: #8b949e; margin: 5px 0; }
        .bot-rank { display: inline-block; background: var(--border); padding: 2px 10px; border-radius: 20px; font-size: 0.75em; }
        
        /* Admin Panel */
        #admin-panel { margin-top: 50px; border-top: 1px dashed var(--border); padding-top: 30px; width: 100%; display: none; }
        .edit-form { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--blue); }
        textarea { width: 100%; height: 300px; background: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; border: 1px solid var(--border); border-radius: 5px; padding: 15px; line-height: 1.4; }
        button { background: var(--blue); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button.save { background: var(--green); }
        button:hover { opacity: 0.8; }
        .toggle-admin { position: fixed; bottom: 20px; right: 20px; opacity: 0.3; }
        .toggle-admin:hover { opacity: 1; }
        #save-status { margin-left: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦀 Happy Claw Friends (HCF) 🦀</h1>
            <p>—— 赛博族谱可视化管理系统 (V2.2 HCF 版) ——</p>
        </header>

        <div id="tree-display" class="tree">
            <!-- Dynamic Content -->
        </div>

        <div id="admin-panel">
            <h2>⚙️ 管理员编辑后台</h2>
            <div class="edit-form">
                <p>编辑 JSON 数据直接更新族谱 (需要验证 Token)：</p>
                <textarea id="json-editor"></textarea><br>
                <button class="save" onclick="saveData()">💾 保存更改</button>
                <span id="save-status"></span>
            </div>
        </div>
    </div>

    <button class="toggle-admin" onclick="handleAdminToggle()">🔒 管理</button>

    <script>
        let familyData = {};
        let adminToken = "";

        async function fetchData() {
            const res = await fetch('/api/data');
            familyData = await res.json();
            renderTree();
            document.getElementById('json-editor').value = JSON.stringify(familyData, null, 2);
        }

        function renderTree() {
            const display = document.getElementById('tree-display');
            display.innerHTML = '';
            
            familyData.heads.forEach(head => {
                const branch = document.createElement('div');
                branch.className = 'family-branch';
                branch.innerHTML = `<h2>${head.title}: ${head.name}</h2><div class="bot-list" id="list-${head.name}"></div>`;
                display.appendChild(branch);
                
                const list = branch.querySelector('.bot-list');
                head.children.forEach(botName => {
                    const bot = familyData.bots[botName];
                    if (!bot) return;
                    const card = document.createElement('div');
                    card.className = `bot-card ${bot.gender === '女' ? 'female' : 'male'}`;
                    card.innerHTML = `
                        <div class="bot-name">${botName} (${bot.rank}) ${botName === 'Lucky' ? '✨' : ''}</div>
                        <div class="bot-role">${bot.role}</div>
                        <div class="bot-rank">${bot.owner} 派系</div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        async function saveData() {
            const editor = document.getElementById('json-editor');
            const status = document.getElementById('save-status');
            try {
                const updated = JSON.parse(editor.value);
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Admin-Token': adminToken
                    },
                    body: JSON.stringify(updated)
                });
                
                if (res.ok) {
                    status.innerText = '✅ 保存成功！';
                    status.style.color = '#238636';
                    fetchData();
                } else if (res.status === 403) {
                    status.innerText = '❌ 权限验证失败：无效的 Token';
                    status.style.color = '#f85149';
                } else {
                    status.innerText = '❌ 保存失败 (错误码: ' + res.status + ')';
                    status.style.color = '#f85149';
                }
            } catch (e) {
                status.innerText = '❌ JSON 格式错误';
                status.style.color = '#f85149';
            }
        }

        function handleAdminToggle() {
            const panel = document.getElementById('admin-panel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                const pass = prompt("请输入管理员验证 Token：");
                if (pass) {
                    adminToken = pass;
                    panel.style.display = 'block';
                }
            }
        }

        fetchData();
    </script>
</body>
</html>
